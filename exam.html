<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>시험 감독표 생성기 v2</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/xlsx/0.18.5/xlsx.full.min.js"></script>
<style>
*{margin:0;padding:0;box-sizing:border-box}
:root{--bg:#f5f7fa;--card:#fff;--pri:#2563eb;--pri-h:#1d4ed8;--pri-l:#dbeafe;--txt:#1e293b;--txt2:#64748b;--bdr:#e2e8f0;--grn:#16a34a;--grn-l:#dcfce7;--red:#dc2626;--red-l:#fee2e2;--yel:#fef3c7;--pur:#f3e8ff;--grn2:#d1fae5;--warn:#f59e0b;--org:#ea580c}
body{font-family:'Pretendard','Apple SD Gothic Neo','Malgun Gothic',sans-serif;background:var(--bg);color:var(--txt);line-height:1.5;font-size:14px}
.app{max-width:1400px;margin:0 auto;padding:12px}
.header{display:flex;align-items:center;gap:12px;margin-bottom:4px}
.header h1{font-size:1.4rem;font-weight:700}
.header .ver{font-size:.7rem;background:var(--pri);color:#fff;padding:2px 8px;border-radius:10px}
.subtitle{color:var(--txt2);font-size:.8rem;margin-bottom:16px}
.tabs{display:flex;gap:2px;border-bottom:2px solid var(--bdr);margin-bottom:16px;overflow-x:auto}
.tab{padding:8px 14px;cursor:pointer;border:none;background:none;font-size:.82rem;color:var(--txt2);border-bottom:2px solid transparent;margin-bottom:-2px;white-space:nowrap;font-family:inherit}
.tab.active{color:var(--pri);border-bottom-color:var(--pri);font-weight:600}
.tab:hover{color:var(--pri)}
.card{background:var(--card);border-radius:10px;padding:16px;margin-bottom:12px;border:1px solid var(--bdr)}
.card h2{font-size:1rem;font-weight:600;margin-bottom:10px;display:flex;align-items:center;gap:8px}
.card h3{font-size:.9rem;font-weight:600;margin:12px 0 6px;color:var(--txt2)}
.btn{padding:6px 14px;border-radius:6px;border:1px solid var(--bdr);background:var(--card);cursor:pointer;font-size:.82rem;font-family:inherit;transition:.15s}
.btn:hover{border-color:var(--pri);color:var(--pri)}
.btn-pri{background:var(--pri);color:#fff;border-color:var(--pri)}
.btn-pri:hover{background:var(--pri-h)}
.btn-sm{padding:3px 8px;font-size:.75rem}
.btn-red{color:var(--red);border-color:var(--red)}
.btn-red:hover{background:var(--red-l)}
.btn-grn{background:var(--grn);color:#fff;border-color:var(--grn)}
.btn-grn:hover{background:#15803d}
.btn-org{background:var(--org);color:#fff;border-color:var(--org)}
.btn-warn{background:var(--warn);color:#fff;border-color:var(--warn)}
input,select,textarea{padding:5px 8px;border:1px solid var(--bdr);border-radius:5px;font-size:.82rem;font-family:inherit}
input:focus,select:focus{outline:none;border-color:var(--pri);box-shadow:0 0 0 2px var(--pri-l)}
table{width:100%;border-collapse:collapse;font-size:.78rem}
th,td{padding:4px 6px;border:1px solid var(--bdr);text-align:center}
th{background:#f1f5f9;font-weight:600;position:sticky;top:0;z-index:1}
.tag{display:inline-block;padding:1px 7px;border-radius:8px;font-size:.72rem;font-weight:500}
.tag-y{background:var(--yel);color:#92400e}.tag-p{background:var(--pur);color:#6b21a8}.tag-g{background:var(--grn2);color:#166534}
.flex{display:flex;gap:8px;align-items:center}.flex-w{display:flex;flex-wrap:wrap;gap:6px}.grow{flex:1}
.grid2{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.mt8{margin-top:8px}.mt12{margin-top:12px}.mb8{margin-bottom:8px}.mb12{margin-bottom:12px}
.text-s{font-size:.78rem;color:var(--txt2)}.text-c{text-align:center}
.scroll-x{overflow-x:auto}
.cell-y{background:#fef9e7!important}.cell-p{background:#f5eef8!important}.cell-g{background:#eafaf1!important}
.cell-edit{cursor:pointer;position:relative}.cell-edit:hover{outline:2px solid var(--pri);z-index:2}
.stat-grid{display:grid;grid-template-columns:repeat(auto-fit,minmax(120px,1fr));gap:6px}
.stat-box{background:#f8fafc;border-radius:8px;padding:10px;text-align:center;border:1px solid var(--bdr)}
.stat-box .val{font-size:1.3rem;font-weight:700;color:var(--pri)}
.stat-box .lbl{font-size:.72rem;color:var(--txt2)}
.progress{width:100%;height:5px;background:var(--bdr);border-radius:3px;overflow:hidden;margin:6px 0}
.progress-bar{height:100%;background:var(--pri);border-radius:3px;transition:width .3s}
.alert{padding:10px 14px;border-radius:8px;font-size:.82rem;margin-bottom:10px}
.alert-info{background:var(--pri-l);color:#1e40af}.alert-warn{background:#fef3c7;color:#92400e}.alert-ok{background:var(--grn-l);color:#166534}
.chip{display:inline-flex;align-items:center;gap:4px;padding:2px 8px;border-radius:10px;font-size:.75rem;background:#f1f5f9;border:1px solid var(--bdr)}
.chip .x{cursor:pointer;color:var(--txt2);font-weight:700}.chip .x:hover{color:var(--red)}
.upload-zone{border:2px dashed var(--bdr);border-radius:10px;padding:30px;text-align:center;cursor:pointer;transition:.2s}
.upload-zone:hover{border-color:var(--pri);background:var(--pri-l)}
.modal-bg{position:fixed;top:0;left:0;width:100%;height:100%;background:rgba(0,0,0,.4);z-index:100;display:flex;align-items:center;justify-content:center}
.modal{background:#fff;border-radius:12px;padding:20px;max-width:400px;width:90%;max-height:80vh;overflow-y:auto;box-shadow:0 20px 60px rgba(0,0,0,.2)}
.modal h3{font-size:1rem;margin-bottom:12px}
.modal .t-list{max-height:300px;overflow-y:auto}
.modal .t-item{padding:6px 10px;cursor:pointer;border-radius:6px;font-size:.85rem}
.modal .t-item:hover{background:var(--pri-l)}
.two-col{display:grid;grid-template-columns:280px 1fr;gap:16px}
@media(max-width:900px){.two-col{grid-template-columns:1fr}}
.sidebar{border-right:1px solid var(--bdr);padding-right:16px}
.exam-sub{font-size:.65rem;color:var(--txt2);display:block;line-height:1.2}
@media print{.no-print{display:none!important}.app{padding:0}.card{border:none;box-shadow:none;padding:8px}table{font-size:9pt}th,td{padding:2px 4px}}
</style>
</head>
<body>
<div class="app" id="root"></div>
<script>
const S={tab:0,teachers:[],subjects:[],days:[],unavailable:[],prevCounts:{},specialConstraints:{lastPeriodLimits:{},avoid3Consec:true},result:null,solving:false,solveProgress:0,modal:null,editingDay:null};
const CL=['1학년 1반','1학년 2반','1학년 3반','1학년 4반','1학년 5반','1학년 6반','2학년 1반','2학년 2반','2학년 3반','2학년 4반','2학년 5반','2학년 6반','3학년 1반','3학년 2반','3학년 3반','3학년 4반','3학년 5반','3학년 6반'];
const FL=['1층','2층','3층','4층'];
const TABS=['📥 기초자료','📝 고사시간표','🚫 감독불가','📊 이전시험','⚙️ 조건','🎯 감독배정','📋 통계/인쇄'];

function save(){try{localStorage.setItem('examV2',JSON.stringify({teachers:S.teachers,subjects:S.subjects,days:S.days,unavailable:S.unavailable,prevCounts:S.prevCounts,specialConstraints:S.specialConstraints}))}catch(e){}}
function load(){try{const d=JSON.parse(localStorage.getItem('examV2'));if(d){Object.assign(S,d);S.result=null;S.solving=false;S.modal=null}}catch(e){}}

function h(t,p,...c){const e=document.createElement(t);if(p)Object.entries(p).forEach(([k,v])=>{if(k==='on'&&typeof v==='object')Object.entries(v).forEach(([ev,fn])=>e.addEventListener(ev,fn));else if(k==='className')e.className=v;else if(k==='style'&&typeof v==='object')Object.assign(e.style,v);else if(k==='innerHTML')e.innerHTML=v;else if(k==='value')e.value=v;else if(k==='checked')e.checked=v;else if(k==='selected')e.selected=v;else if(k==='disabled')e.disabled=v;else e.setAttribute(k,v)});c.flat(9).forEach(x=>{if(x!=null&&x!==false)e.append(typeof x==='string'||typeof x==='number'?document.createTextNode(x):x)});return e}

function R(){const r=document.getElementById('root');r.innerHTML='';
r.append(h('div',{className:'header no-print'},h('h1',null,'📝 시험 감독표 생성기'),h('span',{className:'ver'},'v2.0')),
h('p',{className:'subtitle no-print'},'기초자료 입력 → 고사시간표 설정 → 자동배정 → 엑셀 다운로드'),
h('div',{className:'tabs no-print'},...TABS.map((t,i)=>h('button',{className:'tab'+(S.tab===i?' active':''),on:{click:()=>{S.tab=i;R()}}},t))),
[renderTab0,renderTab1,renderTab2,renderTab3,renderTab4,renderTab5,renderTab6][S.tab]());
if(S.modal)r.append(S.modal)}

// ===== TAB 0: 기초자료 =====
function renderTab0(){
const w=h('div');
// Import section
const ic=h('div',{className:'card'});
ic.append(h('h2',null,'📥 기초자료 가져오기'));
ic.append(h('p',{className:'text-s mb8'},'나이스에서 내려받은 교사 명단 엑셀(이름, 과목, 담당학급 등)을 업로드하거나 직접 입력할 수 있습니다.'));
const fi=h('input',{type:'file',accept:'.xlsx,.xls,.csv',style:{display:'none'},on:{change:e=>importFile(e.target.files[0])}});
ic.append(h('div',{className:'flex mb12'},
h('div',{className:'upload-zone',style:{flex:1,padding:'20px'},on:{click:()=>fi.click()}},fi,'📂 엑셀/CSV 파일 드래그 또는 클릭하여 업로드'),
));
w.append(ic);

// Teacher list
const tc=h('div',{className:'card'});
tc.append(h('h2',null,`교사 목록 (${S.teachers.length}명)`));
const ni=h('input',{placeholder:'이름',style:{width:'100px'}});
const ii=h('input',{placeholder:'번호',style:{width:'60px'}});
const si=h('input',{placeholder:'과목',style:{width:'100px'}});
const hi=h('select',null,h('option',{value:''},'담임 없음'),...CL.map(c=>h('option',{value:c},c)));
tc.append(h('div',{className:'flex mb8'},ni,ii,si,hi,
h('button',{className:'btn btn-pri btn-sm',on:{click:()=>{
const name=ni.value.trim(),id=ii.value.trim();if(!name||!id)return alert('이름과 번호 필수');
if(S.teachers.find(t=>t.id===id))return alert('중복 번호');
S.teachers.push({name,id,fullName:`${name}(${id})`,subject:si.value.trim(),homeroom:hi.value});
S.teachers.sort((a,b)=>a.id.localeCompare(b.id));save();R()}}},'추가'),
h('button',{className:'btn btn-sm btn-red',on:{click:()=>{if(confirm('전체 초기화?')){S.teachers=[];save();R()}}}},'초기화')
));
if(S.teachers.length){
const tb=h('table');
tb.append(h('tr',null,...['번호','이름','전체표기','과목','담임반',''].map(x=>h('th',null,x))));
S.teachers.forEach((t,i)=>{
const hs=h('select',{on:{change:e=>{S.teachers[i].homeroom=e.target.value;save()}}},
h('option',{value:''},'없음'),...CL.map(c=>{const o=h('option',{value:c},c);if(c===t.homeroom)o.selected=true;return o}));
tb.append(h('tr',null,h('td',null,t.id),h('td',null,t.name),h('td',null,t.fullName),
h('td',null,t.subject||''),h('td',null,hs),
h('td',null,h('button',{className:'btn btn-sm btn-red',on:{click:()=>{S.teachers.splice(i,1);save();R()}}},'✕'))));
});
tc.append(h('div',{className:'scroll-x',style:{maxHeight:'400px',overflowY:'auto'}},tb));
}
w.append(tc);

// Subjects
const sc=h('div',{className:'card'});
sc.append(h('h2',null,'과목 목록'));
sc.append(h('p',{className:'text-s mb8'},'시험 과목을 등록합니다. 고사시간표에서 사용됩니다.'));
const sni=h('input',{placeholder:'과목명 (예: 공통국어1)',style:{width:'200px'}});
sc.append(h('div',{className:'flex mb8'},sni,
h('button',{className:'btn btn-pri btn-sm',on:{click:()=>{const v=sni.value.trim();if(v&&!S.subjects.includes(v)){S.subjects.push(v);save();R()}}}},'추가')));
if(S.subjects.length)sc.append(h('div',{className:'flex-w'},...S.subjects.map((s,i)=>
h('span',{className:'chip'},s,h('span',{className:'x',on:{click:()=>{S.subjects.splice(i,1);save();R()}}},'✕')))));
w.append(sc);
return w;
}

function importFile(file){
if(!file)return;
const reader=new FileReader();
reader.onload=e=>{
try{
const wb=XLSX.read(e.target.result,{type:'array'});
const ws=wb.Sheets[wb.SheetNames[0]];
const data=XLSX.utils.sheet_to_json(ws,{header:1});
// Try to parse teacher data - look for columns with name patterns
let imported=0;
data.forEach(row=>{
if(!row||row.length<2)return;
// Try to find name and ID - common patterns from NEIS
const str=row.map(x=>String(x||'')).join('|');
// Pattern: number, name, subject...
for(let i=0;i<row.length-1;i++){
const v=String(row[i]||'').trim();
const v2=String(row[i+1]||'').trim();
if(/^\d{1,2}$/.test(v)&&/^[가-힣]{2,4}$/.test(v2)){
const id=v.padStart(2,'0');
if(!S.teachers.find(t=>t.id===id)){
const subj=row[i+2]?String(row[i+2]).trim():'';
S.teachers.push({name:v2,id,fullName:`${v2}(${id})`,subject:subj,homeroom:''});
imported++;
}
}
}
});
S.teachers.sort((a,b)=>a.id.localeCompare(b.id));
save();R();
alert(`${imported}명의 교사를 가져왔습니다.`);
}catch(err){alert('파일 읽기 실패: '+err.message)}
};
reader.readAsArrayBuffer(file);
}

// ===== TAB 1: 고사시간표 =====
function renderTab1(){
const w=h('div');
const ac=h('div',{className:'card'});
ac.append(h('h2',null,'시험 일정 추가'));
const di=h('input',{type:'date'});
const pi=h('select',null,h('option',{value:'3'},'3교시'),h('option',{value:'4',selected:true},'4교시'));
ac.append(h('div',{className:'flex mb8'},h('span',null,'날짜:'),di,h('span',null,'교시수:'),pi,
h('button',{className:'btn btn-pri',on:{click:()=>{
const date=di.value;if(!date)return alert('날짜 선택');
if(S.days.find(d=>d.date===date))return alert('이미 존재');
const np=parseInt(pi.value),periods=Array.from({length:np},(_,i)=>i+1);
const label=new Date(date+'T00:00:00').toLocaleDateString('ko-KR',{month:'long',day:'numeric',weekday:'short'});
const slotPatterns={},examSubjects={},hallway={};
CL.forEach(c=>{slotPatterns[c]=periods.map(p=>p===1?'자습':'정감독');examSubjects[c]=periods.map(()=>'')});
FL.forEach(f=>{hallway[f]=periods.filter(p=>p>=2)});
S.days.push({date,label,periods,slotPatterns,examSubjects,hallway});
S.days.sort((a,b)=>a.date.localeCompare(b.date));save();R()
}}},'추가')));
w.append(ac);

// Each day's timetable
S.days.forEach((day,di)=>{
const dc=h('div',{className:'card'});
dc.append(h('div',{className:'flex mb8'},h('h2',{className:'grow'},`📅 ${day.label}`),
h('button',{className:'btn btn-sm btn-red',on:{click:()=>{S.days.splice(di,1);save();R()}}},'삭제')));
dc.append(h('p',{className:'text-s mb8'},'각 셀 클릭: 자습↔정감독 전환 | 과목명을 드롭다운에서 선택하면 해당 교시에 시험과목이 표시됩니다.'));

const tb=h('table');
// Header with subject selectors
const hr1=h('tr',null,h('th',{rowspan:'2'},'학급'));
const hr2=h('tr');
day.periods.forEach((p,pi)=>{
hr1.append(h('th',null,`${p}교시`));
if(!day.examSubjects)day.examSubjects={};
const sel=h('select',{style:{width:'100%',fontSize:'.7rem',border:'none',background:'transparent'},
on:{change:e=>{
// Apply this subject to all classes of the relevant grade for this period
// For now, just store per-class
}}},h('option',{value:''},'(과목 선택)'),...S.subjects.map(s=>{const o=h('option',{value:s},s);return o}));
hr2.append(h('td',{style:{background:'#f1f5f9',padding:'2px'}},sel));
});
tb.append(hr1,hr2);

CL.forEach(c=>{
if(!day.slotPatterns[c])day.slotPatterns[c]=day.periods.map(p=>p===1?'자습':'정감독');
if(!day.examSubjects)day.examSubjects={};
if(!day.examSubjects[c])day.examSubjects[c]=day.periods.map(()=>'');
const row=h('tr',null,h('td',{style:{fontWeight:'500'}},c));
day.periods.forEach((p,pi)=>{
const type=day.slotPatterns[c][pi];
const subj=day.examSubjects[c]?.[pi]||'';
const td=h('td',{className:(type==='자습'?'cell-y':'cell-p')+' cell-edit',on:{click:e=>{
if(e.target.tagName==='SELECT')return;
day.slotPatterns[c][pi]=type==='자습'?'정감독':'자습';save();R()}}},
h('span',{className:type==='자습'?'tag tag-y':'tag tag-p'},type),
);
// Subject selector for 정감독 periods
if(type==='정감독'){
const ss=h('select',{style:{display:'block',width:'100%',fontSize:'.65rem',marginTop:'2px',border:'none',background:'transparent',textAlign:'center'},
on:{click:e=>e.stopPropagation(),change:e=>{day.examSubjects[c][pi]=e.target.value;save()}}},
h('option',{value:''},'—'),...S.subjects.map(s=>{const o=h('option',{value:s},s);if(s===subj)o.selected=true;return o}));
td.append(ss);
}
row.append(td);
});
tb.append(row);
});
// Hallway
FL.forEach(f=>{
if(!day.hallway[f])day.hallway[f]=day.periods.filter(p=>p>=2);
const row=h('tr',null,h('td',{style:{fontWeight:'500',background:'#f0fdf4'}},f+'(복도)'));
day.periods.forEach(p=>{
const active=day.hallway[f].includes(p);
row.append(h('td',{className:active?'cell-g cell-edit':'cell-edit',on:{click:()=>{
if(active)day.hallway[f]=day.hallway[f].filter(x=>x!==p);
else{day.hallway[f].push(p);day.hallway[f].sort()}
save();R()}}},active?h('span',{className:'tag tag-g'},'복도'):'—'));
});
tb.append(row);
});
dc.append(h('div',{className:'scroll-x'},tb));
w.append(dc);
});
return w;
}

// ===== TAB 2: 감독불가 =====
function renderTab2(){
const c=h('div',{className:'card'});
c.append(h('h2',null,'🚫 감독 불가 설정'));
c.append(h('p',{className:'text-s mb8'},'날짜만 선택 = 종일 불가 / 교시까지 선택 = 해당 교시만 불가'));
const ts=h('select',null,h('option',{value:''},'교사...'),...S.teachers.map(t=>h('option',{value:t.fullName},t.fullName)));
const ds=h('select',null,h('option',{value:''},'날짜...'),...S.days.map(d=>h('option',{value:d.date},d.label)));
const ps=h('select',null,h('option',{value:''},'전체(종일)'),...[1,2,3,4].map(p=>h('option',{value:p},p+'교시')));
c.append(h('div',{className:'flex mb12'},ts,ds,ps,
h('button',{className:'btn btn-pri',on:{click:()=>{
const teacher=ts.value,date=ds.value,period=ps.value?parseInt(ps.value):null;
if(!teacher||!date)return alert('교사/날짜 선택');
if(S.unavailable.find(u=>u.teacher===teacher&&u.date===date&&u.period===period))return;
S.unavailable.push({teacher,date,period});
S.unavailable.sort((a,b)=>a.teacher.localeCompare(b.teacher)||a.date.localeCompare(b.date));
save();R()}}},'추가')));

if(S.unavailable.length){
const grouped={};
S.unavailable.forEach(u=>{if(!grouped[u.teacher])grouped[u.teacher]=[];
const day=S.days.find(d=>d.date===u.date);grouped[u.teacher].push({...u,dayLabel:day?day.label:u.date})});
Object.entries(grouped).forEach(([teacher,items])=>{
c.append(h('div',{className:'flex-w mb8',style:{alignItems:'center'}},
h('strong',{style:{minWidth:'100px',fontSize:'.85rem'}},teacher),
...items.map(u=>{
const idx=S.unavailable.findIndex(x=>x.teacher===u.teacher&&x.date===u.date&&x.period===u.period);
return h('span',{className:'chip'},u.dayLabel+(u.period?` ${u.period}교시`:' 종일'),

S.result.consec=cc;
}

// ===== SOLVER =====
function buildSlots(){
const slots=[];
S.days.forEach(day=>{
const maxP=Math.max(...day.periods);
CL.forEach(c=>{day.periods.forEach((p,pi)=>{
slots.push({day:day.date,dayLabel:day.label,loc:c,period:p,type:day.slotPatterns[c]?.[pi]==='정감독'?'정감독':'자습',maxP})})});
FL.forEach(f=>{(day.hallway[f]||[]).forEach(p=>{slots.push({day:day.date,dayLabel:day.label,loc:f,period:p,type:'복도',maxP})})});
});return slots;
}
function isUA(fn,date,period){return S.unavailable.some(u=>u.teacher===fn&&u.date===date&&(u.period===null||u.period===period))}
function w3c(ps,np){const t=new Set(ps);t.add(np);const s=[...t].sort((a,b)=>a-b);for(let i=0;i<s.length-2;i++)if(s[i+1]===s[i]+1&&s[i+2]===s[i]+2)return true;return false}
function mulberry32(a){return function(){a|=0;a=a+0x6D2B79F5|0;var t=Math.imul(a^a>>>15,1|a);t^=t+Math.imul(t^t>>>7,61|t);return((t^t>>>14)>>>0)/4294967296}}
function shuffle(a,r){for(let i=a.length-1;i>0;i--){const j=Math.floor(r()*(i+1));[a[i],a[j]]=[a[j],a[i]]}}

function trySolveOnce(seed,slots){
const rng=mulberry32(seed);const asgn={};const tdp={};
const st={};S.teachers.forEach(t=>{st[t.fullName]={정감독:0,자습:0,복도:0,총:0,마지막:0}});
const order=[...Array(slots.length).keys()];shuffle(order,rng);
order.sort((a,b)=>{const sa=slots[a],sb=slots[b];if((sa.type==='복도')!==(sb.type==='복도'))return sa.type==='복도'?-1:1;if((sa.period===sa.maxP)!==(sb.period===sb.maxP))return sa.period===sa.maxP?-1:1;return rng()-.5});
const avoid3=S.specialConstraints.avoid3Consec;const lLim=S.specialConstraints.lastPeriodLimits;
for(const si of order){
const s=slots[si];const{day,period,loc,type}=s;const il=period===s.maxP;let best=null,bestSc=1/0;
for(const t of S.teachers){
const fn=t.fullName;if(isUA(fn,day,period))continue;if(t.homeroom&&t.homeroom===loc)continue;
const k=fn+'|'+day;const ps=tdp[k]||new Set();if(ps.has(period))continue;
const pc=S.prevCounts[fn]||{정:0,자:0,복:0,총:0,막:0};const c=st[fn];
const mk=type==='정감독'?'정':type==='자습'?'자':'복';
let sc=(pc.총+c.총)*18+(pc[mk]+c[type])*9+(pc.막+c.마지막)*7;
if(avoid3&&w3c(ps,period))sc+=3000;
if(fn in lLim&&il&&c.마지막>=lLim[fn])sc+=8000;
if(il){const cl=pc.막+c.마지막;if(cl>=5)sc+=600;else if(cl>=4)sc+=250;else if(cl>=3)sc+=70}
if(c.총>=10)sc+=500;else if(c.총>=9)sc+=100;
if(c[type]>=5)sc+=300;else if(c[type]>=4)sc+=60;
sc+=rng()*2.5;if(sc<bestSc){bestSc=sc;best=fn}}
if(!best)return null;asgn[si]=best;const k=best+'|'+day;if(!tdp[k])tdp[k]=new Set();tdp[k].add(period);
st[best][type]++;st[best].총++;if(il)st[best].마지막++}
for(const[fn,lim]of Object.entries(lLim))if(st[fn]&&st[fn].마지막>lim)return null;
let cc=0;for(const ps of Object.values(tdp)){const sp=[...ps].sort((a,b)=>a-b);for(let i=0;i<sp.length-2;i++)if(sp[i+1]===sp[i]+1&&sp[i+2]===sp[i]+2){cc++;break}}
const totals=S.teachers.map(t=>{const pc=S.prevCounts[t.fullName]||{총:0};return pc.총+st[t.fullName].총});
const ft=S.teachers.map(t=>st[t.fullName].총);
let score=cc*500+(Math.max(...totals)-Math.min(...totals))*50+(Math.max(...ft)-Math.min(...ft))*40;
for(const[sk,mk]of[['정감독','정'],['자습','자'],['복도','복']]){const vs=S.teachers.map(t=>{const pc=S.prevCounts[t.fullName]||{};return(pc[mk]||0)+st[t.fullName][sk]});score+=(Math.max(...vs)-Math.min(...vs))*15}
const ls=S.teachers.map(t=>{const pc=S.prevCounts[t.fullName]||{막:0};return(pc.막||0)+st[t.fullName].마지막});
score+=(Math.max(...ls)-Math.min(...ls))*25;
return{score,cc,asgn,st,tdp}}

async function startSolve(){
S.solving=true;S.result=null;S.solveProgress=0;R();
const slots=buildSlots();const N=3000;let best=null;
for(let i=0;i<N;i++){
const r=trySolveOnce(i,slots);if(r&&(!best||r.score<best.score))best=r;
if(i%150===0){S.solveProgress=Math.round(i/N*100);R();await new Promise(r=>setTimeout(r,0))}}
S.solving=false;
if(best){
const rd=[];for(const[si,teacher]of Object.entries(best.asgn)){const s=slots[parseInt(si)];rd.push({...s,teacher})}
S.result={data:rd,stats:best.st,consec:best.cc,score:best.score}}
S.editingDay=0;R()}

});

const ws2=XLSX.utils.aoa_to_sheet(ws2d);ws2['!cols']=[{wch:14},...Array(15).fill({wch:7})];
